apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ktx-reserve
  namespace: reserve-train-prod
  labels:
    project: reserve-train
    environment: prod
spec:
  ingressClassName: nginx
  rules:
  - host: "reserve-train.abyssworks.dev"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: reserve-train
            port:
              number: 80
