apiVersion: apps/v1
kind: Deployment
metadata:
  name: reserve-train
  namespace: reserve-train-prod
  labels:
    app: reserve-train
    project: reserve-train
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reserve-train
      project: reserve-train
      environment: prod
  template:
    metadata:
      labels:
        app: reserve-train
        project: reserve-train
        environment: prod
    spec:
      containers:
      - name: reserve-train
        image: reserve-train:prod
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: DB_NAME
          value: reservetrain
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
